name: Release

on:
  push:
    tags:
      - "v*"         # triggers on git tag v0.1.0, v1.2.3, etc.
  workflow_dispatch: # also allows manual trigger from GitHub UI

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: linux
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact: macos

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.artifact }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup
        id: setup
        uses: ./.github/actions/setup
        with:
          rust-targets: ${{ matrix.target }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Tauri Vite Template ${{ github.ref_name }}"
          releaseBody: |
            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          releaseDraft: true
          prerelease: false
          args: --config service/tauri.conf.json --target ${{ matrix.target }}
